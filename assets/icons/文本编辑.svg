<?xml version="1.0" encoding="UTF-8"?>
<svg width="50px" height="50px" viewBox="0 0 50 50" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>文本编辑</title>
    <defs>
        <linearGradient id="te-paper" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#f1f1f3"/>
        </linearGradient>
        <linearGradient id="te-pen-body" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#e8e8ec"/>
            <stop offset="0.5" stop-color="#c7c7cd"/>
            <stop offset="1" stop-color="#9a9aa2"/>
        </linearGradient>
        <filter id="te-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.28"/>
        </filter>
    </defs>
    <g fill="none" fill-rule="evenodd">
        <!-- 纸张 -->
        <rect x="9.5" y="3.5" width="31" height="43" rx="2.6" fill="url(#te-paper)"
              stroke="#d4d4d8" stroke-width="0.6" filter="url(#te-shadow)"/>
        <!-- 文字行 -->
        <g stroke="#b9bcc4" stroke-width="1.3" stroke-linecap="round">
            <line x1="13.5" y1="9.5"  x2="30"   y2="9.5"/>
            <line x1="13.5" y1="13.5" x2="36.5" y2="13.5"/>
            <line x1="13.5" y1="17.5" x2="36.5" y2="17.5"/>
            <line x1="13.5" y1="21.5" x2="33"   y2="21.5"/>
            <line x1="13.5" y1="25.5" x2="36.5" y2="25.5"/>
            <line x1="13.5" y1="29.5" x2="35"   y2="29.5"/>
            <line x1="13.5" y1="33.5" x2="27"   y2="33.5"/>
        </g>
        <!-- 钢笔（斜置） -->
        <g transform="rotate(-38 24 40)">
            <!-- 笔杆 -->
            <rect x="14" y="37.4" width="22" height="5.2" rx="2.4" fill="url(#te-pen-body)"
                  stroke="#85858d" stroke-width="0.4"/>
            <!-- 笔杆高光 -->
            <rect x="15" y="38.2" width="20" height="1.1" rx="0.55" fill="#ffffff" opacity="0.75"/>
            <!-- 握位环 -->
            <rect x="33.2" y="37.4" width="1.4" height="5.2" fill="#8e8e96"/>
            <!-- 笔头锥 -->
            <path d="M14,37.6 L8.6,39.55 C8.2,39.7 8.2,40.3 8.6,40.45 L14,42.4 Z" fill="#e0a33c"/>
            <!-- 笔尖 -->
            <path d="M8.9,39.4 L6.6,39.85 C6.4,39.9 6.4,40.1 6.6,40.15 L8.9,40.6 Z" fill="#3a3a3e"/>
            <!-- 笔尾 -->
            <rect x="36" y="38.1" width="1.8" height="3.8" rx="0.9" fill="#74747c"/>
        </g>
    </g>
</svg>
