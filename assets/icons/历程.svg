<svg width="50px" height="50px" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="journeyBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d9bff"/>
      <stop offset="1" stop-color="#4f6ef0"/>
    </linearGradient>
    <linearGradient id="journeyLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="50" height="50" rx="11" fill="url(#journeyBg)"/>
  <!-- 竖向时间线 -->
  <line x1="16" y1="11" x2="16" y2="39" stroke="url(#journeyLine)" stroke-width="2.4" stroke-linecap="round"/>
  <!-- 三个节点圆点 -->
  <circle cx="16" cy="13.5" r="3.4" fill="#ffffff"/>
  <circle cx="16" cy="25" r="3.4" fill="#ffffff"/>
  <circle cx="16" cy="36.5" r="3.4" fill="#ffffff"/>
  <!-- 每个节点对应的卡片条 -->
  <rect x="24" y="11.6" width="16" height="3.6" rx="1.8" fill="#ffffff"/>
  <rect x="24" y="23.1" width="13" height="3.6" rx="1.8" fill="#ffffff" fill-opacity="0.92"/>
  <rect x="24" y="34.6" width="15" height="3.6" rx="1.8" fill="#ffffff" fill-opacity="0.82"/>
</svg>
