<!-- 控制中心面板片段。由 src/javascripts/控制中心.js fetch 后注入 document.body。
     根元素 id="cc-panel"。所有交互由 控制中心.js 接线,这里只提供结构与 SVG。 -->
<div id="cc-panel" role="dialog" aria-label="控制中心">

    <!-- 左上:连接性大药丸 (Wi-Fi / 蓝牙 / 隔空投送) -->
    <div class="cc-card cc-connect">
        <div class="cc-row cc-on" data-cc="wifi">
            <div class="cc-glyph">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.5 9a16 16 0 0 1 19 0" />
                    <path d="M5.5 12.5a11 11 0 0 1 13 0" />
                    <path d="M8.5 16a6 6 0 0 1 7 0" />
                    <circle cx="12" cy="19.5" r="1.1" fill="currentColor" stroke="none" />
                </svg>
            </div>
            <div class="cc-labels">
                <span class="cc-title">Wi-Fi</span>
                <span class="cc-sub" data-cc="wifi-sub">Home</span>
            </div>
        </div>

        <div class="cc-row cc-on" data-cc="bluetooth">
            <div class="cc-glyph">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 7.5 17 16l-5 4V4l5 4L7 16.5" />
                </svg>
            </div>
            <div class="cc-labels">
                <span class="cc-title">蓝牙</span>
                <span class="cc-sub" data-cc="bluetooth-sub">开</span>
            </div>
        </div>

        <div class="cc-row" data-cc="airdrop">
            <div class="cc-glyph">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8.5 14.5a5 5 0 0 1 7 0" />
                    <path d="M6 11.5a9 9 0 0 1 12 0" />
                    <circle cx="12" cy="18" r="1.2" fill="currentColor" stroke="none" />
                </svg>
            </div>
            <div class="cc-labels">
                <span class="cc-title">隔空投送</span>
                <span class="cc-sub" data-cc="airdrop-sub">关</span>
            </div>
        </div>
    </div>

    <!-- 右上:正在播放 -->
    <div class="cc-card cc-nowplaying">
        <div class="cc-np-top">
            <div class="cc-cover"></div>
            <div class="cc-np-meta">
                <div class="cc-np-song">海阔天空</div>
                <div class="cc-np-artist">Beyond</div>
            </div>
        </div>
        <div class="cc-np-controls">
            <button class="cc-np-btn" data-cc="prev" aria-label="上一首">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 5v14h2.2V5zM20 5l-9 7 9 7z" />
                </svg>
            </button>
            <button class="cc-np-btn cc-np-play" data-cc="play" aria-label="播放/暂停">
                <svg viewBox="0 0 24 24" fill="currentColor" data-cc="play-icon">
                    <path d="M7 4.5v15l13-7.5z" />
                </svg>
            </button>
            <button class="cc-np-btn" data-cc="next" aria-label="下一首">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14.8 5v14H17V5zM4 5l9 7-9 7z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Focus 大药丸 -->
    <div class="cc-card cc-focus" data-cc="focus" role="button" tabindex="0">
        <div class="cc-glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 13.5A8.5 8.5 0 0 1 9.2 4 7 7 0 1 0 20 13.5Z" />
            </svg>
        </div>
        <div class="cc-labels">
            <span class="cc-title">专注</span>
            <span class="cc-sub" data-cc="focus-sub">关</span>
        </div>
    </div>

    <!-- Focus 右侧:舞台调度 + 屏幕镜像 -->
    <div class="cc-square-pair">
        <button class="cc-bigbtn" data-cc="stage">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="8" y="6" width="11" height="12" rx="2" />
                <rect x="3.5" y="8.5" width="2.5" height="7" rx="1" />
            </svg>
            <span class="cc-bigbtn-label">舞台调度</span>
        </button>
        <button class="cc-bigbtn" data-cc="mirror">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="11" rx="2" />
                <path d="M8.5 20h7" />
            </svg>
            <span class="cc-bigbtn-label">屏幕镜像</span>
        </button>
    </div>

    <!-- 显示 亮度滑块 -->
    <div class="cc-card cc-slider-card cc-span2">
        <div class="cc-slider-label">显示</div>
        <div class="cc-slider" data-cc="brightness" data-value="1">
            <div class="cc-slider-fill"></div>
            <span class="cc-slider-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4" />
                    <path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8" />
                </svg>
            </span>
        </div>
    </div>

    <!-- 声音 音量滑块 -->
    <div class="cc-card cc-slider-card cc-span2">
        <div class="cc-slider-label">声音</div>
        <div class="cc-slider" data-cc="volume" data-value="0.7">
            <div class="cc-slider-fill"></div>
            <span class="cc-slider-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 9.5h3l4-3.5v12l-4-3.5H4z" fill="currentColor" stroke="none" />
                    <path d="M15.5 9a4 4 0 0 1 0 6" />
                    <path d="M17.8 6.8a7 7 0 0 1 0 10.4" />
                </svg>
            </span>
        </div>
    </div>

    <!-- 底部快捷圆钮 -->
    <div class="cc-quickrow cc-span2">
        <button class="cc-quickbtn" data-cc="dark" aria-label="深色模式">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 13.5A8.5 8.5 0 0 1 9.2 4 7 7 0 1 0 20 13.5Z" />
            </svg>
        </button>
        <button class="cc-quickbtn" data-cc="calc" aria-label="计算器">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="3" width="14" height="18" rx="2.5" />
                <rect x="7.5" y="5.5" width="9" height="3.5" rx="1" />
                <path d="M8.5 13h0M12 13h0M15.5 13h0M8.5 16.5h0M12 16.5h0M15.5 16.5h0" />
            </svg>
        </button>
        <button class="cc-quickbtn" data-cc="timer" aria-label="计时器">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="13.5" r="7.5" />
                <path d="M12 13.5V9M9.5 2h5" />
            </svg>
        </button>
        <button class="cc-quickbtn" data-cc="camera" aria-label="相机">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="7" width="18" height="13" rx="3" />
                <path d="M8.5 7l1.3-2.2h4.4L15.5 7" />
                <circle cx="12" cy="13.5" r="3.2" />
            </svg>
        </button>
    </div>

</div>
