<!-- 控制中心面板片段。由 src/javascripts/控制中心.js fetch 后注入 document.body。
     根元素 id="cc-panel"。结构源码级照搬 thanas-os/src/components/macos/ControlCenter.tsx:
       - 顶部两列网格:左=连接性大卡(Wi-Fi/蓝牙/隔空投送三行),右=Focus 按钮(上)+两个方形按钮(下)
       - 显示亮度滑块卡
       - 声音音量滑块卡(右侧 AirPlay 圆钮)
       - 正在播放卡(封面 + 曲名/艺人 + 上一首/播放/下一首)
     所有交互由 控制中心.js 接线,这里只提供结构与 SVG。 -->
<div id="cc-panel" role="dialog" aria-label="控制中心">

    <!-- 顶部两列网格 -->
    <div class="cc-top-grid">

        <!-- 左:连接性大卡 (Wi-Fi / 蓝牙 / 隔空投送) -->
        <div class="cc-card cc-connect">
            <button class="cc-row cc-on" type="button" data-cc="wifi">
                <div class="cc-glyph">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 5.5a9 9 0 0 1 12 0" />
                        <path d="M4 8a6 6 0 0 1 8 0" />
                        <path d="M6 10.5a3 3 0 0 1 4 0" />
                        <circle cx="8" cy="12.6" r="0.7" fill="currentColor" stroke="none" />
                    </svg>
                </div>
                <div class="cc-labels">
                    <span class="cc-title">Wi-Fi</span>
                    <span class="cc-sub" data-cc="wifi-sub">Webintosh-Net</span>
                </div>
            </button>

            <button class="cc-row cc-on" type="button" data-cc="bluetooth">
                <div class="cc-glyph">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 5l6 6-3 2.5V2.5L11 5 5 11" />
                    </svg>
                </div>
                <div class="cc-labels">
                    <span class="cc-title">蓝牙</span>
                    <span class="cc-sub" data-cc="bluetooth-sub">开</span>
                </div>
            </button>

            <button class="cc-row" type="button" data-cc="airdrop">
                <div class="cc-glyph">
                    <svg viewBox="0 0 16 16" fill="none">
                        <path fill="currentColor" d="M8 2.6666666666666665a5.333333333333333 5.333333333333333 0 0 0 -2.385333333333333 10.104666666666667 0.6666666666666666 0.6666666666666666 0 0 1 -0.5973333333333333 1.1926666666666665A6.666666666666666 6.666666666666666 0 0 1 1.3333333333333333 8C1.3333333333333333 4.318 4.318 1.3333333333333333 8 1.3333333333333333s6.666666666666666 2.9846666666666666 6.666666666666666 6.666666666666666a6.666666666666666 6.666666666666666 0 0 1 -3.6839999999999997 5.9639999999999995 0.6666666666666666 0.6666666666666666 0 1 1 -0.5973333333333333 -1.1926666666666665A5.333333333333333 5.333333333333333 0 0 0 8 2.6666666666666665Zm0 2.6666666666666665a2.6666666666666665 2.6666666666666665 0 0 0 -1.1926666666666665 5.052666666666666 0.6666666666666666 0.6666666666666666 0 0 1 -0.5966666666666667 1.192 4 4 0 1 1 3.579333333333333 0 0.6666666666666666 0.6666666666666666 0 0 1 -0.5973333333333333 -1.192A2.6666666666666665 2.6666666666666665 0 0 0 8 5.333333333333333Zm-1.3333333333333333 2.6666666666666665a1.3333333333333333 1.3333333333333333 0 1 1 2.6666666666666665 0 1.3333333333333333 1.3333333333333333 0 0 1 -2.6666666666666665 0Z" />
                    </svg>
                </div>
                <div class="cc-labels">
                    <span class="cc-title">隔空投送</span>
                    <span class="cc-sub" data-cc="airdrop-sub">仅限联系人</span>
                </div>
            </button>
        </div>

        <!-- 右:Focus(上) + 两个方形按钮(下) -->
        <div class="cc-right-stack">
            <button class="cc-focus" type="button" data-cc="focus">
                <div class="cc-glyph cc-glyph-lg">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 13.5A8.5 8.5 0 0 1 9.2 4 7 7 0 1 0 20 13.5Z" />
                    </svg>
                </div>
                <div class="cc-labels">
                    <span class="cc-title">专注</span>
                    <span class="cc-sub" data-cc="focus-sub">关</span>
                </div>
            </button>

            <div class="cc-square-pair">
                <button class="cc-tile" type="button" data-cc="stage" data-accent="blue">
                    <div class="cc-tile-glyph">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="8" y="6" width="11" height="12" rx="2" />
                            <rect x="3.5" y="8.5" width="2.5" height="7" rx="1" />
                        </svg>
                    </div>
                    <div class="cc-tile-label">舞台调度</div>
                </button>
                <button class="cc-tile" type="button" data-cc="theme" data-accent="amber">
                    <div class="cc-tile-glyph">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4.5" />
                            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
                        </svg>
                    </div>
                    <div class="cc-tile-label" data-cc="theme-label">浅色</div>
                </button>
            </div>
        </div>
    </div>

    <!-- 显示 亮度滑块卡 -->
    <div class="cc-card cc-slider-card">
        <div class="cc-slider-label">显示</div>
        <div class="cc-slider-row">
            <div class="cc-slider" data-cc="brightness" data-value="0.8">
                <div class="cc-slider-fill"></div>
                <span class="cc-slider-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4" />
                        <path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8" />
                    </svg>
                </span>
            </div>
        </div>
    </div>

    <!-- 声音 音量滑块卡(右侧 AirPlay 圆钮) -->
    <div class="cc-card cc-slider-card">
        <div class="cc-slider-label">声音</div>
        <div class="cc-slider-row">
            <div class="cc-slider" data-cc="volume" data-value="0.65">
                <div class="cc-slider-fill"></div>
                <span class="cc-slider-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 9.5h3l4-3.5v12l-4-3.5H4z" fill="currentColor" stroke="none" />
                        <path d="M15.5 9.2a4 4 0 0 1 0 5.6" />
                    </svg>
                </span>
            </div>
            <button class="cc-airplay" type="button" data-cc="sound-airplay" aria-label="AirPlay">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 17H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-1" />
                    <path d="M12 15l5 6H7l5-6z" fill="currentColor" stroke="none" />
                </svg>
            </button>
        </div>
    </div>

    <!-- 正在播放卡 -->
    <div class="cc-card cc-nowplaying">
        <div class="cc-cover"></div>
        <div class="cc-np-meta">
            <div class="cc-np-song">未在播放</div>
            <div class="cc-np-artist">选择一首歌曲开始</div>
        </div>
        <div class="cc-np-controls">
            <button class="cc-np-btn" type="button" data-cc="prev" aria-label="上一首">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 5v14h2.2V5zM20 5l-9 7 9 7z" />
                </svg>
            </button>
            <button class="cc-np-btn" type="button" data-cc="play" aria-label="播放/暂停">
                <svg viewBox="0 0 24 24" fill="currentColor" data-cc="play-icon">
                    <path d="M7 4.5v15l13-7.5z" />
                </svg>
            </button>
            <button class="cc-np-btn" type="button" data-cc="next" aria-label="下一首">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14.8 5v14H17V5zM4 5l9 7-9 7z" />
                </svg>
            </button>
        </div>
    </div>

</div>
