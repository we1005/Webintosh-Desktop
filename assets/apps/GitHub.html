<div class="githubapp window" id="GitHub">
    <div class="topbar">
        <div class="wintools">
            <div class="red"></div>
            <div class="yellow"></div>
            <div class="green"></div>
        </div>
        <p class="title">GitHub</p>
    </div>
    <div class="body">
        <header class="gh-profile">
            <div class="gh-avatar">
                <svg viewBox="0 0 24 24" width="68" height="68" aria-hidden="true">
                    <path fill="#ffffff" d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.36-3.88-1.36-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.7.08-.7 1.17.08 1.78 1.2 1.78 1.2 1.03 1.77 2.71 1.26 3.37.96.1-.75.4-1.26.73-1.55-2.56-.29-5.25-1.28-5.25-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.07 11.07 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.41-5.27 5.69.41.36.78 1.06.78 2.14v3.17c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z"/>
                </svg>
            </div>
            <div class="gh-identity">
                <h1 class="gh-name">Webintosh User</h1>
                <p class="gh-login">@webintosh-user</p>
                <p class="gh-bio">Building delightful things on the web. 热爱开源，喜欢把想法变成可运行的 demo。</p>
                <div class="gh-stats">
                    <span class="gh-stat"><strong>128</strong> Followers</span>
                    <span class="gh-dot">·</span>
                    <span class="gh-stat"><strong>87</strong> Following</span>
                    <span class="gh-dot">·</span>
                    <span class="gh-stat"><strong>342</strong> Stars</span>
                </div>
            </div>
        </header>

        <nav class="gh-tabs">
            <button class="gh-tab active" data-tab="overview" type="button">Overview</button>
            <button class="gh-tab" data-tab="repositories" type="button">Repositories</button>
        </nav>

        <main class="gh-content">
            <section class="gh-panel" data-panel="overview">
                <h2 class="gh-section-title">Pinned</h2>
                <div class="gh-pinned"></div>

                <h2 class="gh-section-title gh-contrib-title">
                    <span class="gh-contrib-count">1,024</span> contributions in the last year
                </h2>
                <div class="gh-heatmap">
                    <div class="gh-heatmap-grid"></div>
                    <div class="gh-heatmap-legend">
                        <span>Less</span>
                        <span class="gh-cell l0"></span>
                        <span class="gh-cell l1"></span>
                        <span class="gh-cell l2"></span>
                        <span class="gh-cell l3"></span>
                        <span class="gh-cell l4"></span>
                        <span>More</span>
                    </div>
                </div>
            </section>

            <section class="gh-panel" data-panel="repositories" hidden>
                <h2 class="gh-section-title">Repositories</h2>
                <div class="gh-repolist"></div>
            </section>
        </main>
    </div>
</div>
