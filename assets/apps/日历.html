<div class="calendarapp window" id="日历">
    <div class="topbar">
        <div class="wintools">
            <div class="red"></div>
            <div class="yellow"></div>
            <div class="green"></div>
        </div>
        <p class="title">日历</p>
        <div class="topbar-spacer"></div>
    </div>
    <div class="body">
        <div class="toolbar">
            <h1 class="cal-title"></h1>
            <div class="toolbar-spacer"></div>
            <div class="nav-group">
                <button class="nav-btn prev-btn" title="上一月">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="nav-btn today-btn">今天</button>
                <button class="nav-btn next-btn" title="下一月">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="weekday-row">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
        </div>
        <div class="grid"></div>
    </div>
</div>
