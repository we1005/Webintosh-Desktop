<div class="finder window" id="访达">
    <div class="left">
        <div class="topbar">
            <div class="wintools">
                <div class="red"></div>
                <div class="yellow"></div>
                <div class="green"></div>
            </div>
        </div>
        <div class="sidebar-list">
            <div class="group-title">个人收藏</div>
            <div class="item" data-path="/Desktop">
                <img class="icon" src="./assets/images/menubar.dock.rectangle.blue.svg">
                <span>桌面</span>
            </div>
            <div class="item" data-path="/Documents">
                <img class="icon" src="./assets/images/document.blue.svg">
                <span>文稿</span>
            </div>
            <div class="item" data-path="/Downloads">
                <img class="icon" src="./assets/images/arrow.down.circle.blue.svg">
                <span>下载</span>
            </div>
            <div class="item" data-path="/Music">
                <img class="icon tint" src="./assets/images/speaker.wave.3.fill.svg">
                <span>音乐</span>
            </div>
            <div class="item" data-path="/Pictures">
                <img class="icon tint" src="./assets/images/photo.circle.svg">
                <span>图片</span>
            </div>
            <div class="item" data-path="/Applications">
                <img class="icon" src="./assets/images/menubar.dock.rectangle.blue.svg">
                <span>应用程序</span>
            </div>
        </div>
    </div>
    <div class="edge"></div>
    <div class="right">
        <div class="toolbar">
            <div class="navigation-controls">
                <button class="nav-btn nav-back" title="返回" disabled>
                    <svg viewBox="0 0 16 16" width="13" height="13"><path d="M10 3 L5 8 L10 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="nav-btn nav-forward" title="前进" disabled>
                    <svg viewBox="0 0 16 16" width="13" height="13"><path d="M6 3 L11 8 L6 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <p class="title">桌面</p>
            <div class="toolbar-spacer"></div>
            <div class="view-seg" role="group" aria-label="显示方式">
                <button class="seg-btn active" data-view="icon" title="以图标显示">
                    <svg viewBox="0 0 16 16" width="15" height="15"><g fill="currentColor"><rect x="2" y="2" width="5" height="5" rx="1.2"/><rect x="9" y="2" width="5" height="5" rx="1.2"/><rect x="2" y="9" width="5" height="5" rx="1.2"/><rect x="9" y="9" width="5" height="5" rx="1.2"/></g></svg>
                </button>
                <button class="seg-btn" data-view="list" title="以列表显示">
                    <svg viewBox="0 0 16 16" width="15" height="15"><g fill="currentColor"><circle cx="3" cy="4" r="1"/><circle cx="3" cy="8" r="1"/><circle cx="3" cy="12" r="1"/><rect x="6" y="3.3" width="8" height="1.4" rx="0.7"/><rect x="6" y="7.3" width="8" height="1.4" rx="0.7"/><rect x="6" y="11.3" width="8" height="1.4" rx="0.7"/></g></svg>
                </button>
                <button class="seg-btn" data-view="column" title="以分栏显示">
                    <svg viewBox="0 0 16 16" width="15" height="15"><g fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2.2" y="2.6" width="11.6" height="10.8" rx="1.6"/><line x1="6.1" y1="2.6" x2="6.1" y2="13.4"/><line x1="9.9" y1="2.6" x2="9.9" y2="13.4"/></g></svg>
                </button>
                <button class="seg-btn" data-view="gallery" title="以画廊显示">
                    <svg viewBox="0 0 16 16" width="15" height="15"><g fill="currentColor"><rect x="3.5" y="2.4" width="9" height="7" rx="1.2"/><rect x="2" y="11" width="2.6" height="2.6" rx="0.7"/><rect x="6.7" y="11" width="2.6" height="2.6" rx="0.7"/><rect x="11.4" y="11" width="2.6" height="2.6" rx="0.7"/></g></svg>
                </button>
            </div>
            <button class="tb-btn sort-btn" title="排序方式">
                <svg viewBox="0 0 16 16" width="15" height="15"><g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="4" x2="9" y2="4"/><line x1="3" y1="8" x2="7" y2="8"/><line x1="3" y1="12" x2="5" y2="12"/><path d="M11.6 3.6 V12.4 M11.6 12.4 L13.4 10.4 M11.6 12.4 L9.8 10.4"/></g></svg>
            </button>
            <button class="tb-btn share-btn" title="共享">
                <svg viewBox="0 0 16 16" width="15" height="15"><g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2.3 V9.6"/><path d="M5.6 4.5 L8 2.1 L10.4 4.5"/><path d="M4.6 7.4 H3.4 V13.4 H12.6 V7.4 H11.4"/></g></svg>
            </button>
            <div class="search-field">
                <svg viewBox="0 0 16 16" width="13" height="13" class="search-ico"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="6.8" cy="6.8" r="4.2"/><line x1="9.9" y1="9.9" x2="13.4" y2="13.4"/></g></svg>
                <input type="text" class="search-input" placeholder="搜索" spellcheck="false" autocomplete="off" />
            </div>
        </div>
        <div class="main-content view-icon" id="finder-content"></div>
        <div class="path-bar"><div class="breadcrumb"></div></div>
        <div class="statusbar"><span class="status-text">0 个项目</span></div>
    </div>
</div>
