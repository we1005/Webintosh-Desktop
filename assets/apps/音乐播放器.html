<div class="musicplayerapp window" id="音乐播放器">
    <div class="topbar">
        <div class="wintools">
            <div class="red"></div>
            <div class="yellow"></div>
            <div class="green"></div>
        </div>
        <p class="title">音乐播放器</p>
    </div>
    <div class="body">
        <aside class="mp-sidebar">
            <div class="mp-side-section">
                <div class="mp-side-label">资料库</div>
                <ul class="mp-nav">
                    <li class="mp-nav-item active" data-view="songs">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.8"/><circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
                        <span>歌曲</span>
                    </li>
                    <li class="mp-nav-item" data-view="albums">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2.2" stroke="currentColor" stroke-width="1.8"/></svg>
                        <span>专辑</span>
                    </li>
                    <li class="mp-nav-item" data-view="artists">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                        <span>艺人</span>
                    </li>
                </ul>
            </div>
            <div class="mp-side-section">
                <div class="mp-side-label">播放列表</div>
                <ul class="mp-nav">
                    <li class="mp-nav-item" data-view="favorites">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.5-7 10-7 10z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
                        <span>我喜欢的</span>
                    </li>
                </ul>
            </div>
        </aside>

        <section class="mp-main">
            <header class="mp-main-head">
                <h1 class="mp-view-title">歌曲</h1>
                <p class="mp-view-sub">资料库中的全部曲目</p>
            </header>
            <div class="mp-track-list" role="list"></div>
            <div class="mp-empty" hidden>这里还没有歌曲。</div>
        </section>
    </div>

    <footer class="mp-playbar">
        <div class="mp-now">
            <div class="mp-now-cover"></div>
            <div class="mp-now-meta">
                <div class="mp-now-title">未在播放</div>
                <div class="mp-now-artist">选择一首歌曲开始</div>
            </div>
            <button class="mp-fav-btn" title="收藏" aria-label="收藏">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.5-7 10-7 10z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
            </button>
        </div>

        <div class="mp-center">
            <div class="mp-controls">
                <button class="mp-btn mp-prev" title="上一首" aria-label="上一首">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7 6v12H5V6h2zm12 0v12l-9-6 9-6z"/></svg>
                </button>
                <button class="mp-btn mp-play" title="播放/暂停" aria-label="播放">
                    <svg class="mp-icon-play" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7L8 5z"/></svg>
                    <svg class="mp-icon-pause" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" hidden><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
                </button>
                <button class="mp-btn mp-next" title="下一首" aria-label="下一首">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17 6v12h2V6h-2zM5 6v12l9-6-9-6z"/></svg>
                </button>
            </div>
            <div class="mp-progress">
                <span class="mp-time mp-time-cur">0:00</span>
                <input class="mp-seek" type="range" min="0" max="1000" value="0" step="1" aria-label="播放进度" />
                <span class="mp-time mp-time-dur">0:00</span>
            </div>
        </div>

        <div class="mp-volume">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M4 9v6h4l5 4V5L8 9H4z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M16 9a4 4 0 0 1 0 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            <input class="mp-vol" type="range" min="0" max="100" value="70" aria-label="音量" />
        </div>
    </footer>
</div>
