<div class="notesapp window" id="备忘录">
    <div class="topbar">
        <div class="wintools">
            <div class="red"></div>
            <div class="yellow"></div>
            <div class="green"></div>
        </div>
        <p class="title">备忘录</p>
    </div>
    <div class="body">
        <aside class="sidebar">
            <div class="sidebar-head">
                <span class="sidebar-label">iCloud</span>
                <button class="new-btn" title="新建备忘录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="note-list"></div>
        </aside>
        <section class="content">
            <div class="content-toolbar">
                <span class="meta-date"></span>
                <div class="toolbar-spacer"></div>
                <button class="delete-btn" title="删除备忘录">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="editor" contenteditable="true" spellcheck="false"></div>
            <div class="empty-state">
                <p class="empty-title">没有选择备忘录</p>
                <p class="empty-sub">从左侧选择一条，或新建一条备忘录。</p>
            </div>
        </section>
    </div>
</div>
