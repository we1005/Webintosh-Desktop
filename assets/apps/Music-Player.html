<div class="musicplayer2app window" id="Music-Player">
    <div class="topbar">
        <div class="wintools">
            <div class="red"></div>
            <div class="yellow"></div>
            <div class="green"></div>
        </div>
        <p class="title">Music</p>
    </div>

    <div class="m2-body">
        <aside class="m2-sidebar">
            <div class="m2-brand">Music</div>

            <div class="m2-search">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
                    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M21 21l-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <input class="m2-search-input" type="search" placeholder="搜索歌曲、艺人、专辑" aria-label="搜索" />
            </div>

            <div class="m2-side-section">
                <div class="m2-side-label">资料库</div>
                <ul class="m2-nav" data-group="library">
                    <li class="m2-nav-item active" data-view="home">
                        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" aria-hidden="true"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.5-7 10-7 10z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
                        <span>主页</span>
                    </li>
                    <li class="m2-nav-item" data-view="charts">
                        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" aria-hidden="true"><path d="M5 20V10M12 20V4M19 20v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                        <span>排行榜</span>
                    </li>
                    <li class="m2-nav-item" data-view="songs">
                        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" aria-hidden="true"><path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.8"/><circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
                        <span>歌曲</span>
                    </li>
                    <li class="m2-nav-item" data-view="albums">
                        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2.2" stroke="currentColor" stroke-width="1.8"/></svg>
                        <span>专辑</span>
                    </li>
                    <li class="m2-nav-item" data-view="artists">
                        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" aria-hidden="true"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                        <span>艺人</span>
                    </li>
                    <li class="m2-nav-item" data-view="favorites">
                        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" aria-hidden="true"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.5-7 10-7 10z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
                        <span>喜爱的歌曲</span>
                    </li>
                </ul>
            </div>

            <div class="m2-side-section">
                <div class="m2-side-label">播放列表</div>
                <ul class="m2-nav" data-group="playlists"></ul>
            </div>
        </aside>

        <section class="m2-main">
            <div class="m2-main-scroll"></div>
        </section>
    </div>

    <footer class="m2-playbar">
        <div class="m2-now">
            <div class="m2-now-cover"></div>
            <div class="m2-now-meta">
                <div class="m2-now-title">未在播放</div>
                <div class="m2-now-artist">选择一首歌曲开始</div>
            </div>
        </div>

        <div class="m2-center">
            <div class="m2-controls">
                <button class="m2-btn m2-prev" type="button" title="上一首" aria-label="上一首">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M7 6v12H5V6h2zm12 0v12l-9-6 9-6z"/></svg>
                </button>
                <button class="m2-btn m2-play" type="button" title="播放/暂停" aria-label="播放">
                    <svg class="m2-icon-play" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7L8 5z"/></svg>
                    <svg class="m2-icon-pause" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true" hidden><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
                </button>
                <button class="m2-btn m2-next" type="button" title="下一首" aria-label="下一首">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M17 6v12h2V6h-2zM5 6v12l9-6-9-6z"/></svg>
                </button>
            </div>
            <div class="m2-progress">
                <span class="m2-time m2-time-cur">0:00</span>
                <input class="m2-seek" type="range" min="0" max="1000" value="0" step="1" aria-label="播放进度" />
                <span class="m2-time m2-time-dur">0:00</span>
            </div>
        </div>

        <div class="m2-volume">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M16 9a4 4 0 0 1 0 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            <input class="m2-vol" type="range" min="0" max="100" value="65" aria-label="音量" />
        </div>
    </footer>
</div>
