<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Webintosh · iPhone</title>
<link rel="stylesheet" href="./ios.css?v=20260612d">
</head>
<body>

<div class="device">
    <div class="device-camera"></div>
    <div class="device-speaker"></div>

    <div class="screen" id="screen">

        <!-- ============ SpringBoard ============ -->
        <div class="springboard" id="springboard">
            <div class="sb-wallpaper" id="sbWallpaper"></div>

            <div class="statusbar">
                <div class="sb-left">
                    <span class="sig"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i></i></span>
                    <span class="carrier">Webintosh</span>
                </div>
                <div class="sb-time">9:41</div>
                <div class="sb-right">
                    <span class="sb-batt-text">100%</span>
                    <span class="batt"><span class="batt-body"><span class="sb-batt-level"></span></span><span class="batt-cap"></span></span>
                </div>
            </div>

            <div class="icon-grid">
                <button class="app" data-app="alert" data-name="信息">
                    <span class="icon ic-messages">
                        <svg viewBox="0 0 60 60"><path d="M30 14.5c-10 0-18 6.3-18 14 0 4.5 2.7 8.4 7 11-.3 2.3-1.4 4.3-3.2 5.8 3-.3 5.7-1.5 7.8-3.2 2.1.5 4.2.4 6.4.4 10 0 18-6.3 18-14s-8-14-18-14z" fill="#fff"/></svg>
                    </span>
                    <span class="label">信息</span>
                </button>
                <button class="app" data-app="alert" data-name="日历">
                    <span class="icon ic-calendar">
                        <span class="cal-week" id="calWeek">星期四</span>
                        <span class="cal-day" id="calDay">11</span>
                    </span>
                    <span class="label">日历</span>
                </button>
                <button class="app" data-app="alert" data-name="照片">
                    <span class="icon ic-photos">
                        <svg viewBox="0 0 60 60">
                            <ellipse cx="30" cy="18.5" rx="6" ry="10.8" fill="#F5D328" opacity=".85"/>
                            <ellipse cx="30" cy="18.5" rx="6" ry="10.8" fill="#F09A37" opacity=".85" transform="rotate(45 30 30)"/>
                            <ellipse cx="30" cy="18.5" rx="6" ry="10.8" fill="#E8534A" opacity=".85" transform="rotate(90 30 30)"/>
                            <ellipse cx="30" cy="18.5" rx="6" ry="10.8" fill="#D74177" opacity=".85" transform="rotate(135 30 30)"/>
                            <ellipse cx="30" cy="18.5" rx="6" ry="10.8" fill="#9D50BB" opacity=".85" transform="rotate(180 30 30)"/>
                            <ellipse cx="30" cy="18.5" rx="6" ry="10.8" fill="#4A66D8" opacity=".85" transform="rotate(225 30 30)"/>
                            <ellipse cx="30" cy="18.5" rx="6" ry="10.8" fill="#3BA8EE" opacity=".85" transform="rotate(270 30 30)"/>
                            <ellipse cx="30" cy="18.5" rx="6" ry="10.8" fill="#52C04D" opacity=".85" transform="rotate(315 30 30)"/>
                        </svg>
                    </span>
                    <span class="label">照片</span>
                </button>
                <button class="app" data-app="alert" data-name="相机">
                    <span class="icon ic-camera">
                        <svg viewBox="0 0 60 60">
                            <path d="M25 21l2.4-4h5.2l2.4 4z" fill="#55555A"/>
                            <rect x="12" y="21" width="36" height="22" rx="4.5" fill="#55555A"/>
                            <circle cx="30" cy="32" r="8" fill="#2B2B2E"/>
                            <circle cx="30" cy="32" r="5.4" fill="#46586E"/>
                            <circle cx="28" cy="30" r="1.6" fill="#9DB6CF"/>
                            <circle cx="43.5" cy="25.5" r="1.4" fill="#E8E8E8"/>
                        </svg>
                    </span>
                    <span class="label">相机</span>
                </button>
                <button class="app" data-app="alert" data-name="天气">
                    <span class="icon ic-weather">
                        <svg viewBox="0 0 60 60">
                            <g stroke="#FFE03A" stroke-width="2.4" stroke-linecap="round">
                                <line x1="23" y1="7.5" x2="23" y2="11.5"/><line x1="23" y1="32.5" x2="23" y2="36.5"/>
                                <line x1="8.5" y1="22" x2="12.5" y2="22"/><line x1="33.5" y1="22" x2="37.5" y2="22"/>
                                <line x1="12.7" y1="11.7" x2="15.5" y2="14.5"/><line x1="30.5" y1="29.5" x2="33.3" y2="32.3"/>
                                <line x1="33.3" y1="11.7" x2="30.5" y2="14.5"/><line x1="15.5" y1="29.5" x2="12.7" y2="32.3"/>
                            </g>
                            <circle cx="23" cy="22" r="8" fill="#FFE03A"/>
                            <g fill="#fff">
                                <circle cx="27" cy="42" r="7"/>
                                <circle cx="37" cy="38" r="9.5"/>
                                <circle cx="47" cy="42.5" r="6.5"/>
                                <rect x="20" y="42" width="34" height="7.5" rx="3.7"/>
                            </g>
                        </svg>
                    </span>
                    <span class="label">天气</span>
                </button>
                <button class="app" data-app="alert" data-name="时钟">
                    <span class="icon ic-clock">
                        <svg viewBox="0 0 60 60">
                            <circle cx="30" cy="30" r="28" fill="#fff"/>
                            <circle cx="30" cy="30" r="25" fill="none" stroke="#0a0a0a" stroke-width="2.6" stroke-dasharray="1.3 11.79" stroke-dashoffset="0.65" transform="rotate(-90 30 30)"/>
                            <g id="clkH"><line x1="30" y1="31.5" x2="30" y2="17.5" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round"/></g>
                            <g id="clkM"><line x1="30" y1="31.5" x2="30" y2="11.5" stroke="#0a0a0a" stroke-width="2.2" stroke-linecap="round"/></g>
                            <g id="clkS"><line x1="30" y1="34" x2="30" y2="9.5" stroke="#FF3B30" stroke-width="1.3" stroke-linecap="round"/></g>
                            <circle cx="30" cy="30" r="1.9" fill="#0a0a0a"/>
                            <circle cx="30" cy="30" r="0.9" fill="#FF3B30"/>
                        </svg>
                    </span>
                    <span class="label">时钟</span>
                </button>
                <button class="app" data-app="alert" data-name="地图">
                    <span class="icon ic-maps">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#EDEBDC"/>
                            <path d="M0 40L60 8v16L0 56z" fill="#CBE7A4"/>
                            <path d="M-2 31c18-5 26 10 64 1" stroke="#F7CF4C" stroke-width="7" fill="none"/>
                            <path d="M-2 31c18-5 26 10 64 1" stroke="#FBE388" stroke-width="1.4" fill="none" stroke-dasharray="4 4"/>
                            <path d="M21-2L35 62" stroke="#fff" stroke-width="6"/>
                            <circle cx="40" cy="17" r="3.4" fill="#3478F6" stroke="#fff" stroke-width="1.4"/>
                        </svg>
                    </span>
                    <span class="label">地图</span>
                </button>
                <button class="app" data-app="alert" data-name="视频">
                    <span class="icon ic-videos">
                        <svg viewBox="0 0 60 60">
                            <circle cx="19" cy="19.5" r="5.5" fill="#fff"/>
                            <circle cx="31" cy="19.5" r="5.5" fill="#fff"/>
                            <rect x="11" y="25" width="27" height="16" rx="4" fill="#fff"/>
                            <path d="M40 30.5l9.5-5v15l-9.5-5z" fill="#fff"/>
                        </svg>
                    </span>
                    <span class="label">视频</span>
                </button>
                <button class="app" data-app="alert" data-name="备忘录">
                    <span class="icon ic-notes">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#FCFBF2"/>
                            <rect width="60" height="14" fill="#F3DF5C"/>
                            <rect y="14" width="60" height="1.2" fill="#D9C33E"/>
                            <g stroke="#CFCDC2" stroke-width="1.3">
                                <line x1="8" y1="27" x2="52" y2="27"/>
                                <line x1="8" y1="37" x2="52" y2="37"/>
                                <line x1="8" y1="47" x2="52" y2="47"/>
                            </g>
                        </svg>
                    </span>
                    <span class="label">备忘录</span>
                </button>
                <button class="app" data-app="alert" data-name="提醒事项">
                    <span class="icon ic-reminders">
                        <svg viewBox="0 0 60 60">
                            <rect width="60" height="60" fill="#fff"/>
                            <circle cx="14" cy="16" r="4" fill="#FC3158"/><line x1="24" y1="16" x2="50" y2="16" stroke="#C9C9CE" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="14" cy="30" r="4" fill="#FF9500"/><line x1="24" y1="30" x2="50" y2="30" stroke="#C9C9CE" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="14" cy="44" r="4" fill="#1BADF8"/><line x1="24" y1="44" x2="50" y2="44" stroke="#C9C9CE" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </span>
                    <span class="label">提醒事项</span>
                </button>
                <button class="app" data-app="alert" data-name="股市">
                    <span class="icon ic-stocks">
                        <svg viewBox="0 0 60 60">
                            <g stroke="#3A3A3E" stroke-width="1">
                                <line x1="6" y1="20" x2="54" y2="20"/><line x1="6" y1="32" x2="54" y2="32"/><line x1="6" y1="44" x2="54" y2="44"/>
                            </g>
                            <polyline points="8,45 17,34 25,39 35,22 43,28 52,13" fill="none" stroke="#41DB64" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="label">股市</span>
                </button>
                <button class="app" data-app="safari" data-name="Safari">
                    <span class="icon ic-safari">
                        <svg viewBox="0 0 60 60">
                            <defs>
                                <linearGradient id="safg" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0" stop-color="#22CFFB"/><stop offset="1" stop-color="#1372E9"/>
                                </linearGradient>
                            </defs>
                            <circle cx="30" cy="30" r="21.5" fill="url(#safg)"/>
                            <circle cx="30" cy="30" r="18" fill="none" stroke="#fff" stroke-width="3.2" stroke-dasharray="0.9 3.81" opacity=".9"/>
                            <g transform="rotate(-45 30 30)">
                                <path d="M30 14.5l3.8 15.5h-7.6z" fill="#FF3B30"/>
                                <path d="M30 45.5L26.2 30h7.6z" fill="#fff"/>
                            </g>
                        </svg>
                    </span>
                    <span class="label">Safari</span>
                </button>
            </div>

            <div class="dock">
                <div class="dock-bg"></div>
                <button class="app" data-app="alert" data-name="电话">
                    <span class="icon ic-phone">
                        <svg viewBox="0 0 60 60"><path d="M19.8 14.6c-2.7 1.4-4.7 3.5-5.7 6.2-1.6 4.8 1.5 11.7 8.2 18.4 6.7 6.7 13.6 9.8 18.4 8.2 2.7-1 4.8-3 6.2-5.7.6-1.2.3-2.6-.7-3.4l-5.7-4.5c-1-.8-2.4-.8-3.4 0l-2.8 2.3c-.5.4-1.3.5-1.8 0-1.5-1.1-3.3-2.6-4.9-4.3-1.7-1.6-3.2-3.4-4.3-4.9-.5-.5-.4-1.3 0-1.8l2.3-2.8c.8-1 .8-2.4 0-3.4l-4.5-5.7c-.8-1-2.2-1.3-3.3-.6z" fill="#fff"/></svg>
                    </span>
                    <span class="label">电话</span>
                </button>
                <button class="app" data-app="alert" data-name="邮件">
                    <span class="icon ic-mail">
                        <svg viewBox="0 0 60 60">
                            <rect x="10.5" y="18.5" width="39" height="25" rx="3" fill="#fff"/>
                            <path d="M11.5 20.5L30 34.5l18.5-14" fill="none" stroke="#42A0EE" stroke-width="2"/>
                            <path d="M12 42l12.5-11M48 42L35.5 31" fill="none" stroke="#9CCBF2" stroke-width="1.6"/>
                        </svg>
                    </span>
                    <span class="label">邮件</span>
                </button>
                <button class="app" data-app="music" data-name="音乐">
                    <span class="icon ic-music">
                        <svg viewBox="0 0 60 60">
                            <path d="M24.5 42V20.5L41 16v21.5" fill="none" stroke="#fff" stroke-width="3.4"/>
                            <ellipse cx="20" cy="42.5" rx="5.3" ry="4.1" fill="#fff"/>
                            <ellipse cx="36.5" cy="38" rx="5.3" ry="4.1" fill="#fff"/>
                        </svg>
                    </span>
                    <span class="label">音乐</span>
                </button>
                <button class="app" data-app="spotify" data-name="Spotify">
                    <span class="icon ic-spotify">
                        <svg viewBox="0 0 60 60">
                            <circle cx="30" cy="30" r="19.5" fill="#1DB954"/>
                            <g fill="none" stroke="#16151A" stroke-linecap="round">
                                <path d="M20.5 24.8c6.4-2.1 14-1.5 19.6 1.7" stroke-width="3.3"/>
                                <path d="M21.6 30.8c5.4-1.6 11.7-1 16.4 1.7" stroke-width="2.8"/>
                                <path d="M22.7 36.4c4.2-1.2 9-.7 12.7 1.4" stroke-width="2.3"/>
                            </g>
                        </svg>
                    </span>
                    <span class="label">Spotify</span>
                </button>
            </div>
        </div>

        <!-- ============ 应用视图（iframe / Safari） ============ -->
        <div class="app-view" id="appView" hidden>
            <iframe id="appFrame" title="应用" allow="autoplay"></iframe>
            <div class="safari-page" id="safariPage" hidden>
                <div class="safari-top">
                    <div class="safari-url">
                        <svg viewBox="0 0 12 14" class="safari-lock"><path d="M3 6V4.5a3 3 0 016 0V6h.6c.6 0 1 .4 1 1v5c0 .6-.4 1-1 1H2.4c-.6 0-1-.4-1-1V7c0-.6.4-1 1-1H3zm1.4 0h3.2V4.5a1.6 1.6 0 00-3.2 0V6z" fill="#8E8E93"/></svg>
                        webintosh.local
                    </div>
                </div>
                <div class="safari-body">
                    <div class="safari-err-title">打不开网页</div>
                    <div class="safari-err-msg">Safari 无法打开网页，因为您的 iPhone 尚未接入互联网。</div>
                </div>
                <div class="safari-toolbar">
                    <svg viewBox="0 0 24 24" class="tb on"><path d="M15 4l-8 8 8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <svg viewBox="0 0 24 24" class="tb"><path d="M9 4l8 8-8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <svg viewBox="0 0 24 24" class="tb on"><path d="M12 3v11M8.5 6L12 2.8 15.5 6M5 10v9h14v-9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <svg viewBox="0 0 24 24" class="tb on"><path d="M5 4h14v16l-7-4-7 4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
                    <svg viewBox="0 0 24 24" class="tb on"><rect x="4" y="7" width="13" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M8 4h12v12" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
                </div>
            </div>
            <button class="home-pill" id="homePill" aria-label="回到主屏幕"><span></span></button>
        </div>

        <!-- ============ 锁屏 ============ -->
        <div class="lockscreen" id="lockscreen">
            <div class="lock-wallpaper"></div>
            <div class="statusbar">
                <div class="sb-left">
                    <span class="sig"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i></i></span>
                    <span class="carrier">Webintosh</span>
                </div>
                <div class="sb-time">9:41</div>
                <div class="sb-right">
                    <span class="sb-batt-text">100%</span>
                    <span class="batt"><span class="batt-body"><span class="sb-batt-level"></span></span><span class="batt-cap"></span></span>
                </div>
            </div>
            <div class="lock-clock">
                <div class="lock-time" id="lockTime">9:41</div>
                <div class="lock-date" id="lockDate">6月11日 星期四</div>
            </div>
            <div class="slide-hint"><span class="slide-text">› 滑动来解锁</span></div>
        </div>

        <!-- ============ iOS 7 弹窗 ============ -->
        <div class="alert-backdrop" id="alertBackdrop" hidden>
            <div class="ios-alert" role="alertdialog">
                <div class="ios-alert-title" id="alertTitle">信息</div>
                <div class="ios-alert-msg" id="alertMsg">该应用尚未安装。</div>
                <button class="ios-alert-btn" id="alertOk">好</button>
            </div>
        </div>

    </div><!-- /.screen -->

    <div class="device-home" id="deviceHome"><span></span></div>
</div>

<script type="module" src="./ios.js?v=20260612d"></script>
</body>
</html>
