<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>复古游戏厅</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { display: flex; flex-direction: column; background: #141416; color: #e8e8ea; font-family: -apple-system, "PingFang SC", sans-serif; }
/* 选择界面 */
#setup {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    background:
        radial-gradient(60% 50% at 50% 0%, rgba(255,80,160,.14), transparent 70%),
        radial-gradient(50% 40% at 80% 100%, rgba(80,160,255,.12), transparent 70%),
        #141416;
    padding: 24px; text-align: center;
}
#setup .glyph { font-size: 56px; }
#setup h1 { font-size: 22px; }
#setup .sub { font-size: 13px; color: #9a9aa0; max-width: 460px; line-height: 1.7; }
#setup .sub b { color: #ffd60a; }
.controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
select, .filebtn {
    height: 38px; padding: 0 16px;
    border: 1px solid rgba(255,255,255,.18); border-radius: 9px;
    background: #2a2a2e; color: #fff; font-size: 14px; font-family: inherit; cursor: pointer;
}
.filebtn { display: inline-flex; align-items: center; background: #e8458b; border-color: #ff66a3; font-weight: 600; }
.filebtn:hover { background: #f0589a; }
.hint { font-size: 11.5px; color: #77777d; }
#game-wrap { flex: 1; min-height: 0; display: none; position: relative; }
#game { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="setup">
    <div class="glyph">🕹️</div>
    <h1>复古游戏厅</h1>
    <div class="sub">
        基于 <b>EmulatorJS</b>(RetroArch 核心编译为 WebAssembly),在浏览器里运行
        NES / SNES / GB / GBA / MD 等主机游戏。<br>
        选择主机类型,然后载入<b>你自己拥有的</b> ROM 文件即可开玩(支持 .nes/.sfc/.gb/.gba/.md/.zip)。
    </div>
    <div class="controls">
        <select id="core">
            <option value="nes">NES / FC 红白机</option>
            <option value="snes">SNES / 超任</option>
            <option value="gb">Game Boy</option>
            <option value="gba">Game Boy Advance</option>
            <option value="segaMD">SEGA Mega Drive</option>
            <option value="arcade">街机 (MAME)</option>
            <option value="n64">N64</option>
            <option value="psx">PlayStation</option>
        </select>
        <label class="filebtn">载入 ROM 开玩
            <input type="file" id="rom" style="display:none">
        </label>
    </div>
    <div class="hint">模拟器内核来自 cdn.emulatorjs.org(需联网)· 仅请使用合法持有或公有领域的 ROM</div>
</div>

<div id="game-wrap"><div id="game"></div></div>

<script>
document.getElementById('rom').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const core = document.getElementById('core').value;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game-wrap').style.display = 'block';

    window.EJS_player = '#game';
    window.EJS_core = core;
    window.EJS_gameName = f.name.replace(/\.[^.]+$/, '');
    window.EJS_gameUrl = URL.createObjectURL(f);
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_language = 'zh-CN';
    window.EJS_startOnLoaded = true;

    const s = document.createElement('script');
    s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
    document.body.appendChild(s);
});
</script>
</body>
</html>
